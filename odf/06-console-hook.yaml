---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: odf-console-patcher
  namespace: openshift-storage
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: odf-console-patcher-role
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
rules:
  - apiGroups: ["operator.openshift.io"]
    resources: ["consoles"]
    verbs: ["get", "patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: odf-console-patcher-binding
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: odf-console-patcher-role
subjects:
  - kind: ServiceAccount
    name: odf-console-patcher
    namespace: openshift-storage

---
apiVersion: batch/v1
kind: Job
metadata:
  name: patch-odf-console
  namespace: openshift-storage
  annotations:
    argocd.argoproj.io/hook: PostSync
    # This ensures ArgoCD deletes the Job after it succeeds so it doesn't clutter your cluster
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: odf-console-patcher
      restartPolicy: OnFailure
      containers:
        - name: patcher
          # Using the public OpenShift CLI image
          image: quay.io/openshift/origin-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              echo "Checking current console plugins..."
              PLUGINS=$(oc get console.operator cluster -o jsonpath='{.spec.plugins}')
              
              if [[ "$PLUGINS" == *"odf-console"* ]]; then
                echo "odf-console is already enabled. Exiting cleanly."
                exit 0
              fi
              
              if [[ -z "$PLUGINS" ]]; then
                echo "No plugins found. Initializing list with odf-console..."
                oc patch console.operator cluster --type=merge -p '{"spec": {"plugins": ["odf-console"]}}'
              else
                echo "Appending odf-console to existing plugin list..."
                oc patch console.operator cluster --type=json -p '[{"op": "add", "path": "/spec/plugins/-", "value": "odf-console"}]'
              fi
              
              echo "Successfully patched console!"