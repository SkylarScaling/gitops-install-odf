---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: odf-crd-waiter
  namespace: openshift-storage
  annotations:
    argocd.argoproj.io/sync-wave: "0"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: odf-crd-waiter-role
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: odf-crd-waiter-binding
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: odf-crd-waiter-role
subjects:
  - kind: ServiceAccount
    name: odf-crd-waiter
    namespace: openshift-storage

---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-odf-crds
  namespace: openshift-storage
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: odf-crd-waiter
      restartPolicy: OnFailure
      containers:
        - name: wait
          image: quay.io/openshift/origin-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Waiting for ODF Operator to create CRDs..."
              
              # Patiently loop until the OpenShift API recognizes the CRD name
              until oc get crd storageclusters.ocs.openshift.io &>/dev/null; do
                echo "Still waiting for StorageCluster CRD..."
                sleep 5
              done
              
              until oc get crd storagesystems.odf.openshift.io &>/dev/null; do
                echo "Still waiting for StorageSystem CRD..."
                sleep 5
              done
              
              # Now that they exist, wait for them to be established and ready
              oc wait --for condition=established --timeout=1200s crd/storageclusters.ocs.openshift.io
              oc wait --for condition=established --timeout=1200s crd/storagesystems.odf.openshift.io
              
              echo "CRDs successfully registered! ArgoCD will now apply Wave 1."